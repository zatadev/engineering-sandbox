# ─────────────────────────────────────────
# Stages — ordre d'exécution du pipeline
# ─────────────────────────────────────────
stages:
  - build
  - test
  - quality
  - docker

# ─────────────────────────────────────────
# Variables globales
# ─────────────────────────────────────────
variables:
  MAVEN_OPTS: "-Dmaven.repo.local=${CI_PROJECT_DIR}/.m2/repository"
  MAVEN_CLI_OPTS: "--batch-mode --no-transfer-progress"
  DOCKER_HOST: "tcp://docker:2375"
  DOCKER_TLS_CERTDIR: ""
  SONAR_USER_HOME: "${CI_PROJECT_DIR}/.sonar"
  GIT_DEPTH: "0"

# ─────────────────────────────────────────
# Cache Maven — évite de retélécharger
# les dépendances à chaque pipeline
# ─────────────────────────────────────────
cache:
  key: "${CI_COMMIT_REF_SLUG}"
  paths:
    - .m2/repository/

# ─────────────────────────────────────────
# Stage : build
# ─────────────────────────────────────────
build:
  stage: build
  image: maven:3.9.15-eclipse-temurin-21
  script:
    - mvn $MAVEN_CLI_OPTS clean package -DskipTests
  artifacts:
    paths:
      - services/common/target/*.jar
      - services/order-contracts/target/*.jar
      - services/user-service/target/*.jar
      - services/order-service/target/*.jar
      - services/notification-service/target/*.jar
    expire_in: 1 hour
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
    - if: '$CI_COMMIT_BRANCH'

# ─────────────────────────────────────────
# Stage : test
# Testcontainers nécessite Docker-in-Docker
# ─────────────────────────────────────────
test:
  stage: test
  image: maven:3.9.15-eclipse-temurin-21
  services:
    - docker:24-dind
  variables:
    DOCKER_HOST: "tcp://docker:2375"
    DOCKER_TLS_CERTDIR: ""
    TESTCONTAINERS_RYUK_DISABLED: "true"
  script:
    - mvn $MAVEN_CLI_OPTS verify
  artifacts:
    when: always
    reports:
      junit:
        - services/user-service/target/surefire-reports/TEST-*.xml
        - services/user-service/target/failsafe-reports/IT-*.xml
        - services/order-service/target/surefire-reports/TEST-*.xml
        - services/order-service/target/failsafe-reports/IT-*.xml
        - services/notification-service/target/surefire-reports/TEST-*.xml
    paths:
      - services/common/target/
      - services/order-contracts/target/
      - services/user-service/target/
      - services/order-service/target/
      - services/notification-service/target/
    expire_in: 1 week
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
    - if: '$CI_COMMIT_BRANCH'

# ─────────────────────────────────────────
# Stage : quality — SonarCloud
# Tourne sur MR, develop et main uniquement
# ─────────────────────────────────────────
quality:
  stage: quality
  image: maven:3.9.15-eclipse-temurin-21
  needs:
    - job: test
      artifacts: true
  cache:
    key: "${CI_JOB_NAME}"
    paths:
      - .sonar/cache
      - .m2/repository/
  script:
    - mvn $MAVEN_CLI_OPTS sonar:sonar
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
    - if: '$CI_COMMIT_BRANCH == "main"'
    - if: '$CI_COMMIT_BRANCH == "develop"'
# ─────────────────────────────────────────
# Stage : docker
# Build et push de l'image Docker
# Tourne sur develop et main uniquement
# ─────────────────────────────────────────
docker:
  stage: docker
  image: docker:24
  services:
    - docker:24-dind
  variables:
    DOCKER_HOST: "tcp://docker:2375"
    DOCKER_TLS_CERTDIR: ""
    IMAGE_NAME: "$CI_REGISTRY_IMAGE/user-service"
  before_script:
    - docker login -u "$CI_REGISTRY_USER" -p "$CI_REGISTRY_PASSWORD" "$CI_REGISTRY"
  script:
    - |
      if [ "$CI_COMMIT_BRANCH" = "main" ]; then
        TAG="${CI_COMMIT_TAG:-latest}"
        VERSION="${CI_COMMIT_TAG:-0.0.0}"
      elif [ "$CI_COMMIT_BRANCH" = "develop" ]; then
        TAG="develop-${CI_COMMIT_SHORT_SHA}"
        VERSION="0.0.0-develop-${CI_COMMIT_SHORT_SHA}"
      else
        TAG="mr-${CI_COMMIT_SHORT_SHA}"
        VERSION="0.0.0-mr-${CI_COMMIT_SHORT_SHA}"
      fi
    - docker build
      --build-arg APP_VERSION="$VERSION"
      -t "$IMAGE_NAME:$TAG"
      -f services/user-service/Dockerfile .
    - |
      if [ "$CI_COMMIT_BRANCH" = "main" ] || [ "$CI_COMMIT_BRANCH" = "develop" ]; then
        docker push "$IMAGE_NAME:$TAG"
      fi
    - |
      if [ "$CI_COMMIT_BRANCH" = "main" ]; then
        docker tag "$IMAGE_NAME:$TAG" "$IMAGE_NAME:latest"
        docker push "$IMAGE_NAME:latest"
      fi
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
    - if: '$CI_COMMIT_BRANCH == "main"'
    - if: '$CI_COMMIT_BRANCH == "develop"'