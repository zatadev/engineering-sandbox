# ─────────────────────────────────────────
# Stages — ordre d'exécution du pipeline
# ─────────────────────────────────────────
stages:
  - build
  - test
  - quality

# ─────────────────────────────────────────
# Variables globales
# ─────────────────────────────────────────
variables:
  MAVEN_OPTS: "-Dmaven.repo.local=${CI_PROJECT_DIR}/.m2/repository"
  MAVEN_CLI_OPTS: "--batch-mode --no-transfer-progress"
  DOCKER_HOST: "tcp://docker:2375"
  DOCKER_TLS_CERTDIR: ""
  SONAR_USER_HOME: "${CI_PROJECT_DIR}/.sonar"
  GIT_DEPTH: "0"

# ─────────────────────────────────────────
# Cache Maven — évite de retélécharger
# les dépendances à chaque pipeline
# ─────────────────────────────────────────
cache:
  key: "${CI_COMMIT_REF_SLUG}"
  paths:
    - .m2/repository/

# ─────────────────────────────────────────
# Stage : build
# ─────────────────────────────────────────
build:
  stage: build
  image: maven:3.9-eclipse-temurin-21
  script:
    - mvn $MAVEN_CLI_OPTS clean package -DskipTests
  artifacts:
    paths:
      - services/user-service/target/*.jar
    expire_in: 1 hour
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
    - if: '$CI_COMMIT_BRANCH'

# ─────────────────────────────────────────
# Stage : test
# Testcontainers nécessite Docker-in-Docker
# ─────────────────────────────────────────
test:
  stage: test
  image: maven:3.9-eclipse-temurin-21
  services:
    - docker:24-dind
  variables:
    DOCKER_HOST: "tcp://docker:2375"
    DOCKER_TLS_CERTDIR: ""
    TESTCONTAINERS_RYUK_DISABLED: "true"
  script:
    - mvn $MAVEN_CLI_OPTS verify
  artifacts:
    when: always
    reports:
      junit:
        - services/user-service/target/surefire-reports/TEST-*.xml
        - services/user-service/target/failsafe-reports/IT-*.xml
    paths:
      - services/user-service/target/
    expire_in: 1 week
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
    - if: '$CI_COMMIT_BRANCH'

# ─────────────────────────────────────────
# Stage : quality — SonarCloud
# Tourne sur MR, develop et main uniquement
# ─────────────────────────────────────────
quality:
  stage: quality
  image: maven:3.9-eclipse-temurin-21
  needs:
    - job: test
      artifacts: true
  cache:
    key: "${CI_JOB_NAME}"
    paths:
      - .sonar/cache
      - .m2/repository/
  script:
    - mvn $MAVEN_CLI_OPTS sonar:sonar
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
    - if: '$CI_COMMIT_BRANCH == "main"'
    - if: '$CI_COMMIT_BRANCH == "develop"'