# ─────────────────────────────────────────
# Stages — ordre d'exécution du pipeline
# ─────────────────────────────────────────
stages:
  - test
  - quality
  - docker

# ─────────────────────────────────────────
# Variables globales
# ─────────────────────────────────────────
variables:
  MAVEN_OPTS: "-Dmaven.repo.local=${CI_PROJECT_DIR}/.m2/repository"
  MAVEN_CLI_OPTS: "--batch-mode --no-transfer-progress"
  SONAR_USER_HOME: "${CI_PROJECT_DIR}/.sonar"

# ─────────────────────────────────────────
# Template partagé pour les jobs de test
# Cache keyed sur le contenu des pom.xml
# partagé entre toutes les branches qui ont
# les mêmes dépendances.
# ─────────────────────────────────────────
.test-base:
  image: maven:3.9.15-eclipse-temurin-21
  stage: test
  variables:
    TESTCONTAINERS_RYUK_DISABLED: "true"
    TESTCONTAINERS_HOST_OVERRIDE: "host.docker.internal"
    GIT_DEPTH: "1"
  before_script:
    - mkdir -p /root
    - echo "testcontainers.reuse.enable=true" > /root/.testcontainers.properties
  cache:
    key:
      files:
        - "**/pom.xml"
    paths:
      - .m2/repository/
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
    - if: '$CI_COMMIT_BRANCH'

# ─────────────────────────────────────────
# Stage : test — 3 jobs parallèles
# Chaque service construit uniquement ses
# modules upstream (-am) puis lance verify.
# ─────────────────────────────────────────
test:user-service:
  extends: .test-base
  script:
    - mvn $MAVEN_CLI_OPTS -pl services/user-service -am verify
  artifacts:
    when: always
    reports:
      junit:
        - services/user-service/target/surefire-reports/TEST-*.xml
        - services/user-service/target/failsafe-reports/IT-*.xml
    paths:
      - services/user-service/target/
    expire_in: 1 week

test:order-service:
  extends: .test-base
  script:
    - mvn $MAVEN_CLI_OPTS -pl services/order-service -am verify
  artifacts:
    when: always
    reports:
      junit:
        - services/order-service/target/surefire-reports/TEST-*.xml
        - services/order-service/target/failsafe-reports/IT-*.xml
    paths:
      - services/order-service/target/
    expire_in: 1 week

test:notification-service:
  extends: .test-base
  script:
    - mvn $MAVEN_CLI_OPTS -pl services/notification-service -am verify
  artifacts:
    when: always
    reports:
      junit:
        - services/notification-service/target/surefire-reports/TEST-*.xml
    paths:
      - services/notification-service/target/
    expire_in: 1 week

# ─────────────────────────────────────────
# Stage : quality — SonarCloud
# Tourne en autonome et relance verify pour avoir les
# rapports JaCoCo complets : les jobs test compilent
# chacun un seul module (-pl), SonarCloud a besoin
# d'analyser tous les modules en une passe.
# GIT_DEPTH=0 requis pour SonarCloud
# (blame + historique des branches).
# ─────────────────────────────────────────
quality:
  stage: quality
  image: maven:3.9.15-eclipse-temurin-21
  variables:
    TESTCONTAINERS_RYUK_DISABLED: "true"
    TESTCONTAINERS_HOST_OVERRIDE: "host.docker.internal"
    GIT_DEPTH: "0"
  before_script:
    - mkdir -p /root
    - echo "testcontainers.reuse.enable=true" > /root/.testcontainers.properties
  cache:
    key: "${CI_JOB_NAME}"
    paths:
      - .sonar/cache
      - .m2/repository/
  script:
    - mvn $MAVEN_CLI_OPTS verify sonar:sonar
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
    - if: '$CI_COMMIT_BRANCH == "main"'
    - if: '$CI_COMMIT_BRANCH == "develop"'

# ─────────────────────────────────────────
# Stage : docker
# /!\ Build user-service uniquement pour l'instant.
# À étendre avec un job par service quand order-service
# et notification-service seront prêts au déploiement.
# ─────────────────────────────────────────
docker:
  stage: docker
  image: docker:24
  variables:
    IMAGE_NAME: "$CI_REGISTRY_IMAGE/user-service"
    GIT_DEPTH: "1"
  before_script:
    - docker login -u "$CI_REGISTRY_USER" -p "$CI_REGISTRY_PASSWORD" "$CI_REGISTRY"
  script:
    - |
      if [ "$CI_COMMIT_BRANCH" = "main" ]; then
        TAG="${CI_COMMIT_TAG:-latest}"
        VERSION="${CI_COMMIT_TAG:-0.0.0}"
      elif [ "$CI_COMMIT_BRANCH" = "develop" ]; then
        TAG="develop-${CI_COMMIT_SHORT_SHA}"
        VERSION="0.0.0-develop-${CI_COMMIT_SHORT_SHA}"
      else
        TAG="mr-${CI_COMMIT_SHORT_SHA}"
        VERSION="0.0.0-mr-${CI_COMMIT_SHORT_SHA}"
      fi
    - docker build
      --build-arg APP_VERSION="$VERSION"
      -t "$IMAGE_NAME:$TAG"
      -f services/user-service/Dockerfile .
    - |
      if [ "$CI_COMMIT_BRANCH" = "main" ] || [ "$CI_COMMIT_BRANCH" = "develop" ]; then
        docker push "$IMAGE_NAME:$TAG"
      fi
    - |
      if [ "$CI_COMMIT_BRANCH" = "main" ]; then
        docker tag "$IMAGE_NAME:$TAG" "$IMAGE_NAME:latest"
        docker push "$IMAGE_NAME:latest"
      fi
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
    - if: '$CI_COMMIT_BRANCH == "main"'
    - if: '$CI_COMMIT_BRANCH == "develop"'
