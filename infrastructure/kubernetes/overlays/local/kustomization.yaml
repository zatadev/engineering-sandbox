apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - ../../base

# Local overrides for kind cluster
# Images are loaded via: kind load docker-image <image>:local --name sandbox
# imagePullPolicy: IfNotPresent is already set in base manifests
patches:
  - patch: |-
      - op: replace
        path: /spec/replicas
        value: 1
    target:
      kind: Deployment
      name: notification-service