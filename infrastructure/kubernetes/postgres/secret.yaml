apiVersion: v1
kind: Secret
metadata:
  name: postgres-secret
  namespace: sandbox-infra
  labels:
    app.kubernetes.io/name: postgres
    app.kubernetes.io/component: database
type: Opaque
# Values are base64-encoded. We will use Vault or Sealed Secrets (Phase 8).
# echo -n 'value' | base64
data:
  postgres-user: c2FuZGJveA==      # sandbox
  postgres-password: c2FuZGJveA==  # sandbox
  postgres-db: dXNlcmRi            # userdb