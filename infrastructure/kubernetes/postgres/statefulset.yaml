apiVersion: v1
kind: Service
metadata:
  name: postgres
  namespace: sandbox-infra
  labels:
    app.kubernetes.io/name: postgres
    app.kubernetes.io/component: database
spec:
  # Headless service (clusterIP: None) — required for StatefulSets.
  # Instead of a virtual IP, DNS resolves directly to pod IPs.
  # Enables stable DNS per pod: postgres-0.postgres.sandbox-infra.svc.cluster.local
  clusterIP: None
  selector:
    app.kubernetes.io/name: postgres
  ports:
    - name: postgres
      port: 5432
      targetPort: 5432
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: postgres
  namespace: sandbox-infra
  labels:
    app.kubernetes.io/name: postgres
    app.kubernetes.io/component: database
spec:
  # serviceName links this StatefulSet to its headless Service,
  # enabling stable network identity per pod.
  serviceName: postgres
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: postgres
  template:
    metadata:
      labels:
        app.kubernetes.io/name: postgres
        app.kubernetes.io/component: database
    spec:
      containers:
        - name: postgres
          image: postgres:16-alpine
          ports:
            - containerPort: 5432
              name: postgres
          env:
            - name: POSTGRES_DB
              valueFrom:
                secretKeyRef:
                  name: postgres-secret
                  key: postgres-db
            - name: POSTGRES_USER
              valueFrom:
                secretKeyRef:
                  name: postgres-secret
                  key: postgres-user
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: postgres-secret
                  key: postgres-password
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
          livenessProbe:
            exec:
              command:
                - pg_isready
                - -U
                - sandbox
                - -d
                - userdb
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            exec:
              command:
                - pg_isready
                - -U
                - sandbox
                - -d
                - userdb
            initialDelaySeconds: 5
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 3
          volumeMounts:
            - name: postgres-data
              mountPath: /var/lib/postgresql/data
              # subPath avoids PostgreSQL startup failure:
              # the official image refuses to start if the volume root is not empty.
              subPath: postgres
            - name: init-scripts
              mountPath: /docker-entrypoint-initdb.d
      volumes:
        - name: init-scripts
          configMap:
            name: postgres-init-scripts
  volumeClaimTemplates:
    - metadata:
        name: postgres-data
      spec:
        # ReadWriteOnce — the volume can be mounted by a single node at a time.
        # Correct for a single-replica database.
        accessModes: ["ReadWriteOnce"]
        resources:
          requests:
            storage: 1Gi
        # No storageClassName — uses the cluster default (standard in kind).
        # In production (EKS/GKE), specify explicitly: gp3, premium-rwo, etc.