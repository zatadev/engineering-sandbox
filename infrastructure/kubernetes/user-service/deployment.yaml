apiVersion: apps/v1
kind: Deployment
metadata:
  name: user-service
  namespace: sandbox
  labels:
    app.kubernetes.io/name: user-service
    app.kubernetes.io/component: backend
spec:
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: user-service
  # Rolling update — zero downtime deployments.
  # At most 1 pod unavailable, at most 1 extra pod during rollout.
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 1
      maxSurge: 1
  template:
    metadata:
      labels:
        app.kubernetes.io/name: user-service
        app.kubernetes.io/component: backend
    spec:
      # Graceful shutdown — gives in-flight requests time to complete
      # before the pod is terminated.
      terminationGracePeriodSeconds: 30
      containers:
        - name: user-service
          # Local development image — loaded via: kind load docker-image user-service:local --name sandbox
          # For CI/CD: registry.gitlab.com/zatadev/engineering-sandbox/user-service:<tag>
          image: user-service:local
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8080
              name: http
          envFrom:
            - configMapRef:
                name: user-service-config
          env:
            - name: SPRING_DATASOURCE_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: user-service-secret
                  key: db-password
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: user-service-secret
                  key: jwt-secret
          resources:
            # Requests: guaranteed resources used for scheduling decisions.
            # Limits: hard ceiling — pod is OOMKilled if memory limit is exceeded.
            requests:
              cpu: 200m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
          # startupProbe: remplace liveness pendant le démarrage.
          # Tant qu'elle n'a pas passé, liveness et readiness sont désactivées.
          # failureThreshold * periodSeconds = temps maximum accordé au démarrage
          # 30 * 10s = 300 secondes maximum
          startupProbe:
            httpGet:
              path: /actuator/health/liveness
              port: 8080
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 30    # 30 * 10s = 300s max pour démarrer
          # Liveness: is the JVM alive?
          # Failure → pod is restarted.
          livenessProbe:
            httpGet:
              path: /actuator/health/liveness
              port: 8080
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          # Readiness: is the service ready to accept traffic?
          # Failure → pod is removed from Service endpoints, no traffic sent.
          # Checks: app state + database + redis connectivity.
          readinessProbe:
            httpGet:
              path: /actuator/health/readiness
              port: 8080
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 3

---
apiVersion: v1
kind: Service
metadata:
  name: user-service
  namespace: sandbox
  labels:
    app.kubernetes.io/name: user-service
    app.kubernetes.io/component: backend
spec:
  # ClusterIP: internal only.
  # External access via Ingress (ZAT-121).
  type: ClusterIP
  selector:
    app.kubernetes.io/name: user-service
  ports:
    - name: http
      port: 80
      targetPort: 8080