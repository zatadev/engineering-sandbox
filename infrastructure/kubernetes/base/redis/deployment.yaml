apiVersion: apps/v1
kind: Deployment
metadata:
  name: redis
  namespace: sandbox-infra
  labels:
    app.kubernetes.io/name: redis
    app.kubernetes.io/component: cache
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: redis
  template:
    metadata:
      labels:
        app.kubernetes.io/name: redis
        app.kubernetes.io/component: cache
    spec:
      containers:
        - name: redis
          image: redis:7-alpine
          ports:
            - containerPort: 6379
              name: redis
          # Disable persistence — Redis is used as cache only.
          # Data loss on restart is acceptable; the cache rebuilds itself.
          args: ["--save", ""]
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 128Mi
          livenessProbe:
            exec:
              command:
                - redis-cli
                - ping
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
          readinessProbe:
            exec:
              command:
                - redis-cli
                - ping
            initialDelaySeconds: 5
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 3
---
apiVersion: v1
kind: Service
metadata:
  name: redis
  namespace: sandbox-infra
  labels:
    app.kubernetes.io/name: redis
    app.kubernetes.io/component: cache
spec:
  # Standard ClusterIP — no need for headless since Redis is stateless here.
  # Accessible at: redis.sandbox-infra.svc.cluster.local
  selector:
    app.kubernetes.io/name: redis
  ports:
    - name: redis
      port: 6379
      targetPort: 6379