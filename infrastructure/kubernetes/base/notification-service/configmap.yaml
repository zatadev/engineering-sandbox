apiVersion: v1
kind: ConfigMap
metadata:
  name: notification-service-config
  namespace: sandbox
  labels:
    app.kubernetes.io/name: notification-service
    app.kubernetes.io/component: backend
data:
  SPRING_PROFILES_ACTIVE: kubernetes
  SERVER_PORT: "8082"
  # Redis
  REDIS_HOST: redis.sandbox-infra.svc.cluster.local
  REDIS_PORT: "6379"
  # RabbitMQ — not deployed on K8s yet (ZAT-193)
  RABBITMQ_HOST: rabbitmq.sandbox-infra.svc.cluster.local
  RABBITMQ_PORT: "5672"
  RABBITMQ_USER: guest
  # Kafka — not deployed on K8s yet (ZAT-193)
  # localhost:9092 lets the KafkaConsumer construct (DNS resolves); actual connection
  # fails asynchronously with retries — does not crash the app.
  KAFKA_BOOTSTRAP_SERVERS: localhost:9092
  # Actuator
  MANAGEMENT_ENDPOINTS_WEB_EXPOSURE_INCLUDE: health,info,metrics,prometheus
  MANAGEMENT_ENDPOINT_HEALTH_SHOW_DETAILS: always
  MANAGEMENT_ENDPOINT_HEALTH_PROBES_ENABLED: "true"
  MANAGEMENT_ENDPOINT_HEALTH_GROUP_LIVENESS_INCLUDE: livenessState
  MANAGEMENT_ENDPOINT_HEALTH_GROUP_READINESS_INCLUDE: readinessState,redis
  # Disable broker health indicators — Kafka and RabbitMQ not deployed on K8s yet
  # Without this, KafkaHealthIndicator blocks the probe for its full connection timeout
  MANAGEMENT_HEALTH_KAFKA_ENABLED: "false"
  MANAGEMENT_HEALTH_RABBIT_ENABLED: "false"
  # OpenTelemetry — Tempo not deployed on K8s
  MANAGEMENT_TRACING_ENABLED: "false"
