apiVersion: v1
kind: ConfigMap
metadata:
  name: user-service-config
  namespace: sandbox
  labels:
    app.kubernetes.io/name: user-service
    app.kubernetes.io/component: backend
data:
  SPRING_PROFILES_ACTIVE: kubernetes
  SERVER_PORT: "8080"
  # PostgreSQL — Service DNS: postgres.sandbox-infra.svc.cluster.local
  SPRING_DATASOURCE_URL: jdbc:postgresql://postgres.sandbox-infra.svc.cluster.local:5432/userdb
  SPRING_DATASOURCE_USERNAME: sandbox
  # Redis — Service DNS: redis.sandbox-infra.svc.cluster.local
  SPRING_DATA_REDIS_HOST: redis.sandbox-infra.svc.cluster.local
  SPRING_DATA_REDIS_PORT: "6379"
  # Actuator — enable Kubernetes liveness and readiness probe endpoints
  MANAGEMENT_ENDPOINTS_WEB_EXPOSURE_INCLUDE: health,info,metrics,prometheus
  MANAGEMENT_ENDPOINT_HEALTH_SHOW_DETAILS: always
  MANAGEMENT_ENDPOINT_HEALTH_PROBES_ENABLED: "true"
  MANAGEMENT_ENDPOINT_HEALTH_GROUP_LIVENESS_INCLUDE: livenessState
  MANAGEMENT_ENDPOINT_HEALTH_GROUP_READINESS_INCLUDE: readinessState,db,redis
  # Désactiver l'export OpenTelemetry — Tempo non déployé en Phase 6
  MANAGEMENT_TRACING_ENABLED: "false"