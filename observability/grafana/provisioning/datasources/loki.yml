apiVersion: 1

datasources:
  - name: Loki
    type: loki
    access: proxy
    url: http://loki:3100
    uid: loki
    isDefault: false
    editable: false
    jsonData:
      derivedFields: # cle de correlation
        - name: TraceID
          matcherRegex: '"traceId":"([a-f0-9]+)"'
          url: "$${__value.raw}"
          datasourceUid: tempo