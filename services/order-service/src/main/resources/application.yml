server:
  port: 8081
security:
  jwt:
    secret: ${JWT_SECRET:dev-secret-key-minimum-32-characters-long}
    expiration-ms: ${JWT_EXPIRATION_MS:900000} # 15 minutes
spring:
  application:
    name: order-service

  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/orderdb}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:postgres}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    open-in-view: false
    properties:
      hibernate:
        format_sql: true

  flyway:
    enabled: true
    locations: classpath:db/migration

  rabbitmq:
    host: ${RABBITMQ_HOST:localhost}
    port: ${RABBITMQ_PORT:5672}
    username: ${RABBITMQ_USER:guest}
    password: ${RABBITMQ_PASSWORD:guest}

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: always
    info:
      git:
        mode: full
      access: read_only
  info:
    env:
      enabled: true
    java:
      enabled: true
    build:
      enabled: true
    git:
      mode: simple

info:
  app:
    name: ${spring.application.name}
    version: @project.version@
    description: Order Service - event producer

logging:
  level:
    root: INFO
    com.zatadev: DEBUG
